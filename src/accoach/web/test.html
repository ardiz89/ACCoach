<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>HONE · Test in pista</title>
  <link rel="icon" href="/static/hone_icon.png">
  <link rel="stylesheet" href="/static/test.css">
</head>
<body>
  <div class="livebar">
    <span class="brand">
      <svg viewBox="0 0 40 32" width="24" height="20" aria-hidden="true">
        <path d="M7 5 L21 16 L7 27" fill="none" stroke="#22D3CE" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="15" cy="16" r="4" fill="#34E08A"/>
      </svg>HONE
    </span>
    <span class="dot" id="dot" title="feed live"></span>
    <div class="live-field"><span class="k">Auto</span><span class="v" id="l-car">—</span></div>
    <div class="live-field"><span class="k">Pista</span><span class="v" id="l-track">—</span></div>
    <div class="live-field"><span class="k">km/h</span><span class="v" id="l-speed">—</span></div>
    <div class="live-field"><span class="k">Delta</span><span class="v" id="l-delta">—</span></div>
    <span class="cuechip" id="l-cue">in attesa del feed…</span>
  </div>

  <div class="wrap">
    <div class="setup">
      <label>Categoria
        <select id="category"></select>
      </label>
      <label>Simulatore
        <div class="seg" id="sim">
          <button type="button" data-sim="ACC" class="sel">ACC</button>
          <button type="button" data-sim="AC">AC</button>
        </div>
      </label>
      <label>Auto usata
        <input id="car" placeholder="es. Ferrari 296 GT3">
      </label>
      <label>Pista
        <input id="track" placeholder="es. Monza">
      </label>
    </div>

    <p class="intro" id="intro"></p>

    <div class="progress">
      <span id="p-text">0 / 0</span>
      <div class="bar"><i id="p-bar"></i></div>
      <button class="linkbtn" id="tourBtn" type="button">Come funziona</button>
      <button class="linkbtn" id="glossBtn" type="button">Glossario</button>
    </div>

    <div class="card" id="card"><!-- filled by JS --></div>
  </div>

  <div class="actionbar">
    <div class="wrap-inner">
      <button class="nav-btn" id="prev" type="button">‹ Indietro</button>
      <button class="nav-btn primary" id="next" type="button">Avanti ›</button>
      <span class="savestate" id="savestate">non salvato</span>
    </div>
  </div>

  <dialog id="glossDlg">
    <h3>Glossario</h3>
    <dl class="gloss" id="glossBody"></dl>
    <div style="text-align:right;margin-top:14px">
      <button class="nav-btn" type="button" onclick="document.getElementById('glossDlg').close()">Chiudi</button>
    </div>
  </dialog>

  <script src="/static/tour.js"></script>
  <script src="/static/test.js"></script>
</body>
</html>
